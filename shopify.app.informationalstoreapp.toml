# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "63249a746ab77c6085021ad1e8cbb9c9"
application_url = "https://ninetwobydrstewartapp.onrender.com"
embedded = true
name = "informationalstoreapp"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,write_metaobject_definitions,write_metaobjects,write_products"

[auth]
redirect_urls = [
  "https://ninetwobydrstewartapp.onrender.com/auth/callback",
  "https://ninetwobydrstewartapp.onrender.com/auth/shopify/callback",
  "https://ninetwobydrstewartapp.onrender.com/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = true
